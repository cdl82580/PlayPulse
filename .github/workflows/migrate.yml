name: Migrate

# Runs Prisma migrations on deploy.
#   push to `dev`  -> Development environment -> Neon `dev` branch
#   push to `main` -> Production environment  -> Neon `main` branch
# Secrets (DATABASE_URL, DIRECT_URL) are scoped per GitHub Environment, so the
# correct database is targeted automatically. Runs only after CI succeeds.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, dev]

jobs:
  migrate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Maps main -> production, dev -> development. Create these two
    # Environments in repo Settings → Environments and add the DB secrets.
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check for database secret
        id: guard
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No DATABASE_URL secret for this environment yet — skipping migrations. See docs/SETUP.md step 6."
          fi

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - name: Apply migrations
        if: steps.guard.outputs.ready == 'true'
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
